name: Bug report
description: Report a defect or unexpected behavior
labels:
  - type/bug
body:
  - type: markdown
    attributes:
      value: |
        This issue will appear under **Bug Fixes** in the release notes
        once it is labeled with `release/X.Y.Z`.

  - type: input
    id: keycloak-version
    attributes:
      label: Keycloak version
      placeholder: "26.5.0"
    validations:
      required: true

  - type: input
    id: provider-version
    attributes:
      label: GSIS Provider version
      placeholder: "1.0.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What is the problem?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
