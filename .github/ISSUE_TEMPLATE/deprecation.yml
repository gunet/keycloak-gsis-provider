name: Deprecation notice
description: Propose deprecating functionality
labels:
  - type/deprecated
body:
  - type: textarea
    id: description
    attributes:
      label: What is being deprecated?
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Reason for deprecation
    validations:
      required: true

  - type: textarea
    id: migration
    attributes:
      label: Migration path
      description: How should users migrate?
